<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pacientes</title>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    background:
        radial-gradient(circle at top, rgba(78,163,255,0.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(0,212,255,0.13), transparent 28%),
        linear-gradient(135deg, #050608, #080b10 50%, #0e1520);
    color:#f8fafc;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
}

.contenedor{
    max-width:1200px;
    margin:auto;
    padding:50px 40px;
}

.encabezado{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:28px;
}

h1{
    font-size:30px;
    font-weight:800;
    margin:0;
}

.buscador{
    width:320px;
    padding:13px 16px;
    border-radius:14px;
    border:1px solid rgba(148,163,184,0.25);
    background:rgba(15,23,42,0.95);
    color:white;
}

.lista{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:18px;
}

.tarjeta{
    background:rgba(20, 24, 33, 0.92);
    border:1px solid rgba(255,255,255,0.10);
    border-radius:22px;
    padding:22px;
    min-height:185px;
    box-shadow:0 18px 45px rgba(0,0,0,0.28);
    transition:0.25s;
}

.tarjeta:hover{
    transform:translateY(-4px);
    border-color:rgba(56,189,248,0.45);
}

.nombre{
    font-size:22px;
    font-weight:bold;
    margin-bottom:8px;
}

.info{
    color:#94a3b8;
    font-size:14px;
    margin-top:6px;
    line-height:1.35;
}

button{
    margin-top:16px;
    padding:11px 18px;
    border:none;
    border-radius:9px;
    background:linear-gradient(135deg, #2563eb, #00d4ff);
    color:white;
    cursor:pointer;
    font-size:14px;
}

button:hover{
    box-shadow:0 0 28px rgba(0,212,255,0.28);
}

@media(max-width:700px){
    .contenedor{
        padding:32px 20px;
    }

    .encabezado{
        flex-direction:column;
        align-items:flex-start;
        gap:18px;
    }

    .buscador{
        width:100%;
    }
}
</style>

  <link rel="stylesheet" href="css/reportes.css">
</head>

<body>

<div class="contenedor">

<div class="encabezado">
    <h1>📁 Pacientes</h1>

    <input
        class="buscador"
        id="buscadorPacientes"
        placeholder="Buscar paciente..."
    >
</div>

<div id="listaPacientes" class="lista">
    <p style="color:#999;">Cargando pacientes...</p>
</div>

</div>

<script type="module" src="js/pacientes.js"></script>

  <script type="module" src="js/components/accesosRapidos.js"></script>
  <script type="module" src="js/reportes.js"></script>
</body>
</html>
