<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Expediente médico</title>

<style>
*{
    box-sizing:border-box;
}
    
body
    {
    margin:0;
    background:
        radial-gradient(circle at top left,#1f2937,transparent 35%),
        linear-gradient(135deg,#030303,#101010);
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
}

.layout{
    display:grid;
    grid-template-columns:280px 1fr;
    min-height:100vh;
}

.sidebar{
    background:rgba(255,255,255,0.04);
    border-right:1px solid rgba(255,255,255,0.12);
    padding:34px 26px;
    backdrop-filter:blur(16px);
}

.sidebar h2{
    font-size:26px;
    font-weight:300;
    margin:0 0 30px;
}

.menu button{
    width:100%;
    display:block;
    margin-bottom:14px;
    padding:15px 18px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.06);
    color:white;
    text-align:left;
    cursor:pointer;
    transition:0.25s;
}

.menu button:hover{
    background:white;
    color:black;
    transform:translateX(5px);
}

.contenido{
    padding:58px 6%;
}

h1{
    font-size:52px;
    font-weight:300;
    margin:0 0 8px;
}

.subtitulo{
    color:#9ca3af;
    margin-bottom:26px;
}

.acciones{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:26px;
}

button{
    padding:13px 22px;
    border:none;
    border-radius:999px;
    background:white;
    color:black;
    cursor:pointer;
    transition:0.25s;
}

button:hover{
    transform:scale(1.03);
    background:#d8d8d8;
}

.boton-secundario{
    background:transparent;
    color:white;
    border:1px solid rgba(255,255,255,0.35);
}

.boton-secundario:hover{
    background:white;
    color:black;
}

.tarjeta{
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:28px;
    padding:34px;
    margin-bottom:24px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
    backdrop-filter:blur(18px);
}

.tarjeta h2{
    margin-top:0;
    font-size:28px;
    font-weight:300;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:24px;
}

.dato{
    padding:18px;
    border-radius:18px;
    background:rgba(0,0,0,0.25);
    border:1px solid rgba(255,255,255,0.08);
}

.dato label{
    color:#9ca3af;
    display:block;
    margin-bottom:8px;
    font-size:14px;
}

.dato div{
    font-size:19px;
    line-height:1.4;
}

@media(max-width:800px){
    .layout{
        grid-template-columns:1fr;
    }

    .sidebar{
        border-right:none;
        border-bottom:1px solid rgba(255,255,255,0.12);
    }

    h1{
        font-size:38px;
    }
}
</style>

    <body>


</head>

<body>

<div class="layout">

<aside class="sidebar">
    <h2>Expediente</h2>

    <div class="menu">
        <button onclick="mostrarResumen()">Resumen</button>
        <button onclick="abrirNota()">Notas</button>
        <button onclick="abrirHistoriaClinica()">
        Historia clínica
        </button>
        <button>Estudios</button>
        <button>Tratamiento</button>
    </div>
</aside>

<main class="contenido">

<h1 id="nombrePaciente">Cargando paciente...</h1>

<button onclick="editarNombrePaciente()">
✏️ Editar nombre
</button>    

<button style="background:#8b0000; color:white;"
onclick="solicitarEliminarPaciente()">
Suspender / solicitar eliminación
</button>
    
<button onclick="editarDatosPaciente()">
✏️ Editar datos generales
</button>
    
<div class="tarjeta">
    <h2>Datos generales</h2>

    <div class="grid">
        <div class="dato">
            <label>Correo</label>
            <div id="correoPaciente">Cargando...</div>
        </div>

        <div class="dato">
            <label>Diagnóstico</label>
            <div id="diagnostico">Cargando...</div>
        </div>

        <div class="dato">
            <label>Tratamiento</label>
            <div id="tratamiento">Cargando...</div>
        </div>

        <div class="dato">
            <label>Médico tratante</label>
            <div id="medicoTratante">Cargando...</div>
        </div>

        <div class="dato">
            <label>Última consulta</label>
            <div id="ultimaConsulta">Cargando...</div>
        </div>

        <div class="dato">
            <label>Teléfono</label>
            <div id="telefonoPaciente">Cargando...</div>
        </div>
    </div>
</div>

</main>

</div>

<script type="module" src="js/paciente.js"></script>

    
</body>
</html>
