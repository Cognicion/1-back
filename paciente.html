<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Expediente médico</title>

<style>
body{
    margin:0;
    background:#080808;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.layout{
    display:grid;
    grid-template-columns:280px 1fr;
    min-height:100vh;
}

.sidebar{
    background:#111;
    border-right:1px solid #333;
    padding:30px;
}

.sidebar h2{
    font-weight:300;
    margin-bottom:30px;
}

.menu button{
    width:100%;
    display:block;
    margin-bottom:14px;
    padding:14px 18px;
    border-radius:14px;
    border:1px solid #333;
    background:#181818;
    color:white;
    text-align:left;
    cursor:pointer;
}

.menu button:hover{
    background:white;
    color:black;
}

.contenido{
    padding:50px;
}

h1{
    font-size:44px;
    font-weight:300;
}

.tarjeta{
    background:#161616;
    border:1px solid #333;
    border-radius:25px;
    padding:30px;
    margin-bottom:24px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.dato label{
    color:#999;
    display:block;
    margin-bottom:6px;
}

.dato div{
    font-size:20px;
}

@media(max-width:800px){
    .layout{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="layout">

<aside class="sidebar">
    <h2>Expediente</h2>

    <div class="menu">
        <button onclick="mostrarResumen()">Resumen</button>
        <button onclick="abrirNota()">Notas</button>
        <button>Historia clínica</button>
        <button>Estudios</button>
        <button>Tratamiento</button>
    </div>
</aside>

<main class="contenido">

<h1 id="nombrePaciente">Cargando paciente...</h1>

<button onclick="editarNombrePaciente()">
✏️ Editar nombre
</button>    

<button onclick="editarNombrePaciente()">
Editar nombre
</button>
    
<div class="tarjeta">
    <h2>Datos generales</h2>

    <div class="grid">
        <div class="dato">
            <label>Correo</label>
            <div id="correoPaciente">Cargando...</div>
        </div>

        <div class="dato">
            <label>Diagnóstico</label>
            <div id="diagnostico">Cargando...</div>
        </div>

        <div class="dato">
            <label>Tratamiento</label>
            <div id="tratamiento">Cargando...</div>
        </div>

        <div class="dato">
            <label>Médico tratante</label>
            <div id="medicoTratante">Cargando...</div>
        </div>

        <div class="dato">
            <label>Última consulta</label>
            <div id="ultimaConsulta">Cargando...</div>
        </div>

        <div class="dato">
            <label>Rol</label>
            <div id="rolPaciente">Cargando...</div>
        </div>
    </div>
</div>

</main>

</div>

<script type="module" src="js/paciente.js"></script>

</body>
</html>
