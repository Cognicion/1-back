<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Expediente médico</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="icon" type="image/png" href="assets/favicon-cognicion.png">
  <link rel="stylesheet" href="css/paciente.css">
</head>

<body>

<div class="topbar">
  <img class="logo-mini" src="assets/logo-cognicion.png" alt="Cognicion">

  <button class="btn-secundario" onclick="window.location.href='medico.html'">
    ← Pacientes
  </button>

  <button class="btn-secundario" onclick="window.location.href='dashboard.html'">
    🏠 Inicio
  </button>
</div>

<div class="layout">

  <aside class="sidebar">
    <h2>Expediente</h2>

    <div class="menu">
      <button onclick="mostrarResumen()">Resumen</button>
      <button onclick="abrirNota()">Notas</button>
      <button onclick="abrirHistoriaClinica()">Historia clínica</button>
      <button>Estudios</button>
      <button>Tratamiento</button>
      <button onclick="mostrarPermisos()">Permisos</button>
    </div>
  </aside>

  <main class="contenido">

    <h1 id="nombrePaciente">Cargando paciente...</h1>

    <button onclick="editarNombrePaciente()">✏️ Editar nombre</button>

    <button style="background:#8b0000; color:white;" onclick="solicitarEliminarPaciente()">
      Suspender / solicitar eliminación
    </button>

    <button class="oculto" onclick="editarDatosPaciente()">Editar datos generales</button>

    <section id="seccionResumen">
      <div class="tarjeta">
        <h2>Datos generales <button class="boton-editar-dato" onclick="editarCampoPaciente('nombre', 'Nombre', 'text')">Editar nombre</button></h2>

        <div class="grid">
          <div class="dato">
            <label>Correo <button class="boton-editar-dato" onclick="editarCampoPaciente('email', 'Correo', 'text')">Editar</button></label>
            <div id="correoPaciente">Cargando...</div>
          </div>

          <div class="dato">
            <label>Fecha de nacimiento <button class="boton-editar-dato" onclick="editarCampoPaciente('fechaNacimiento', 'Fecha de nacimiento', 'date')">Editar</button></label>
            <div id="fechaNacimientoPaciente">Sin registro</div>
          </div>

          <div class="dato">
            <label>Edad manual <button class="boton-editar-dato" onclick="editarCampoPaciente('edad', 'Edad manual', 'number')">Editar</button></label>
            <div id="edadPaciente">No registrada</div>
          </div>

          <div class="dato diagnosticos-lista">
            <label>Diagnósticos</label>
            <div id="diagnostico">Cargando...</div>
          </div>

          <div class="dato">
            <label>Tratamiento <button class="boton-editar-dato" onclick="editarCampoPaciente('tratamiento', 'Tratamiento', 'textarea')">Editar</button></label>
            <div id="tratamiento">Cargando...</div>
          </div>

          <div class="dato">
            <label>Médico tratante <button class="boton-editar-dato" onclick="editarCampoPaciente('medicoTratante', 'Medico tratante', 'text')">Editar</button></label>
            <div id="medicoTratante">Cargando...</div>
          </div>

          <div class="dato">
            <label>Última consulta <button class="boton-editar-dato" onclick="editarCampoPaciente('ultimaConsulta', 'Ultima consulta', 'date')">Editar</button></label>
            <div id="ultimaConsulta">Cargando...</div>
          </div>

          <div class="dato-card">
            <span>Próxima consulta <button class="boton-editar-dato" onclick="editarCampoPaciente('proximaConsulta', 'Proxima consulta', 'date')">Editar</button></span>
            <strong id="proximaConsulta">Sin programar</strong>
          </div>

          <div class="dato">
            <label>Teléfono <button class="boton-editar-dato" onclick="editarCampoPaciente('telefono', 'Telefono', 'text')">Editar</button></label>
            <div id="telefonoPaciente">Cargando...</div>
          </div>
        </div>
      </div>
    </section>

    <section id="seccionPermisos" style="display:none;">
      <div class="tarjeta">
        <h2>🔐 Permisos del expediente</h2>

        <div class="grid">
          <div class="dato">
            <label>Correo del médico</label>
            <input id="correoMedicoPermiso" type="email" placeholder="medico@correo.com">
          </div>

          <div class="dato">
            <label>Rol</label>
            <select id="rolPermisoMedico">
              <option value="colaborador">Colaborador</option>
              <option value="tratante">Tratante</option>
              <option value="estudiante">Estudiante</option>
            </select>
          </div>
        </div>

        <button onclick="agregarPermisoMedico()">
          Agregar médico
        </button>

        <hr>

        <h3>Médicos con acceso</h3>

        <div id="listaPermisosMedicos">
          Cargando permisos...
        </div>
      </div>
    </section>

  </main>

</div>

<script type="module" src="js/paciente.js"></script>

</body>
</html>
