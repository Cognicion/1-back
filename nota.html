<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel médico</title>

<link rel="stylesheet" href="css/theme.css">
<link rel="icon" type="image/png" href="assets/favicon-cognicion.png">
<link rel="stylesheet" href="css/nota.css">


</head>

<body>

<div class="contenedor">

<img class="logo-nota" src="assets/favicon-cognicion.png" alt="Cognicion">

<h1>👨‍⚕️ Nota médica</h1>

<div id="bloqueSelectorPaciente">

    <label>Seleccionar paciente</label>
        
    <select id="uidPaciente">

        <option value="">
            Seleccionar paciente
        </option>

    </select>

</div>

<label for="buscadorDiagnostico">Diagnóstico visible para paciente (CIE-10)</label>

<input
    id="buscadorDiagnostico"
    type="text"
    placeholder="Buscar por código o diagnóstico. Ej. F33.2 o depresivo"
    autocomplete="off"
>

<div id="resultadosCIE10"></div>

<input type="hidden" id="cie10Codigo">
<input type="hidden" id="cie10Nombre">

<h3>Diagnósticos seleccionados</h3>
<div class="grid-diagnosticos">
    <div>
        <label for="buscadorCIE10">Diagnostico CIE-10</label>
        <input
            id="buscadorCIE10"
            type="text"
            placeholder="Buscar CIE-10. Ej. F33.2 o depresivo"
            autocomplete="off"
        >
        <div id="resultadosCIE10Lista"></div>
    </div>

    <div>
        <label for="buscadorCIE11">Diagnostico CIE-11</label>
        <input
            id="buscadorCIE11"
            type="text"
            placeholder="Buscar CIE-11. Ej. 6A70 o depresivo"
            autocomplete="off"
        >
        <div id="resultadosCIE11Lista"></div>
    </div>
</div>

<label for="diagnosticoCatalogoVisible">Mostrar en panel medico</label>
<select id="diagnosticoCatalogoVisible">
    <option value="auto">Automatico / diagnostico principal</option>
    <option value="CIE-10">CIE-10</option>
    <option value="CIE-11">CIE-11</option>
</select>

<div id="diagnosticosSeleccionados"></div>



<label>Tratamiento visible para paciente</label>
<input
    id="buscadorMedicamento"
    type="text"
    placeholder="Buscar medicamento. Ej. sertralina, litio, quetiapina"
    autocomplete="off"
>
<div id="resultadosMedicamentos"></div>
<textarea id="tratamiento" placeholder="Medicamentos actuales"></textarea>

<label>Médico tratante visible para paciente</label>
<input id="medico" placeholder="Dr. Aldo Sandokan Aguilar Valenzuela">

<label>Última consulta visible para paciente</label>
<input id="ultimaConsulta" type="date">

<label>Próxima consulta visible para paciente</label>
<input id="proximaConsulta" type="date">

<hr>

<h2>Nota interna médica</h2>

<label>Tipo de nota</label>
<select id="tipoNota">
    <option value="completa">Nota completa</option>
    <option value="rapida">Nota rapida</option>
</select>

<div id="bloqueNotaRapida" class="bloque-nota-rapida oculto">
    <label>Nota rapida</label>
    <textarea id="notaRapida" placeholder="Resumen breve de evolucion, indicaciones o seguimiento"></textarea>
</div>

<div id="bloqueNotaCompleta">
<label>Subjetivo</label>
<textarea id="subjetivo"></textarea>

<label>Examen mental / Objetivo</label>
<textarea id="objetivo"></textarea>

<label>Análisis clínico</label>
<textarea id="analisis"></textarea>

<label>Plan</label>
<textarea id="plan"></textarea>
</div>

<button onclick="guardarNotaMedica()">
Guardar nota médica
</button>

<button id="btnCancelarEdicion" class="boton-secundario oculto" onclick="cancelarEdicionNota()">
Cancelar edicion
</button>

<button class="boton-pdf" onclick="generarPDFNota()">
    Descargar nota en PDF
</button>

<hr style="margin-top:40px; margin-bottom:30px;">

<h2>📋 Historial de notas</h2>

<div id="historialNotas">

<p style="color:#999;">
No hay notas registradas
</p>

</div>
    
</div>

<script type="module" src="js/nota.js"></script>

</body>

<div class="barra-superior">
    <button class="boton-secundario" onclick="regresarDesdeNota()">
        ← Regresar
    </button>

    <button class="boton-secundario" onclick="window.location.href='dashboard.html'">
        Inicio
    </button>
</div>

</html>
