<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca clínica | Cognición</title>
<link rel="icon" type="image/png" href="assets/favicon-cognicion.png">
<link rel="stylesheet" href="css/biblioteca.css">
  <link rel="stylesheet" href="css/reportes.css">
</head>
<body class="bloqueado">
<header class="header">
  <div class="marca">
    <img src="assets/favicon-cognicion.png" alt="Cognicion">
    <div>
      <h1>Biblioteca clínica</h1>
      <p>Vademécum, diagnósticos CIE, criterios orientativos y psicoeducación.</p>
    </div>
  </div>
  <nav>
    <button onclick="window.location.href='medico.html'">Panel medico</button>
    <button onclick="window.location.href='dashboard.html'">Inicio</button>
  </nav>
</header>

<main class="layout">
  <section class="card buscador">
    <input id="buscadorBiblioteca" placeholder="Buscar diagnóstico, medicamento, criterio o tema psicoeducativo...">
  </section>

  <section class="tabs">
    <button data-tab="diagnosticos" class="activo">Diagnósticos</button>
    <button data-tab="vademecum">Vademécum</button>
    <button data-tab="psicoeducacion">Psicoeducación</button>
  </section>

  <section id="panelBiblioteca" class="grid"></section>
</main>

<script type="module" src="js/biblioteca.js"></script>
  <script type="module" src="js/reportes.js"></script>
</body>
</html>
