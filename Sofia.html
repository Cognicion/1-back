<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyecto Sofía | Cognición</title>
  <link rel="stylesheet" href="css/sofia.css" />
</head>
<body>
  <main class="sofia-shell">
    <section class="sofia-card">
      <p class="eyebrow">COGNICIÓN LABS</p>
      <h1>Proyecto Sofía</h1>
      <p class="subtitle">Sistema experimental de inteligencia clínica.</p>

      <div id="estadoAcceso" class="status">Verificando acceso...</div>

      <section id="chatBox" class="chat-box">
        <div class="msg sofia">
          Hola. Soy Sofía, un módulo experimental de Cognición.
        </div>
      </section>

      <form id="formSofia" class="input-row">
        <input id="mensajeSofia" type="text" placeholder="Escribe un mensaje..." autocomplete="off" />
        <button type="submit">Enviar</button>
      </form>
    </section>
  </main>

  <script type="module" src="js/sofia.js"></script>
</body>
</html>
