<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>N-Back Visual</title>

<style>

body{
text-align:center;
font-family:Arial;
background:#f5f5f5;
}

h1{
margin-top:30px;
}

#grid{
display:grid;
grid-template-columns:repeat(3,120px);
gap:15px;
justify-content:center;
margin-top:50px;
}

.cell{
width:120px;
height:120px;
background:white;
border:3px solid #333;
border-radius:15px;
}

.active{
background:#2563eb;
}

</style>
</head>

<body>

<h1>N-Back Visual</h1>

<div id="grid">

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

</div>

<script>

const cells=document.querySelectorAll(".cell");

function mostrar(){

cells.forEach(c=>{
c.classList.remove("active");
});

let pos=Math.floor(Math.random()*9);

cells[pos].classList.add("active");

}

mostrar();

setInterval(mostrar,1000);

</script>

</body>
</html>
