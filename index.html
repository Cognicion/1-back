<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>N Back Visual</title>

<style>

body{
text-align:center;
font-family:Arial;
}

#grid{
display:grid;
grid-template-columns:repeat(3,100px);
gap:10px;
justify-content:center;
margin-top:40px;
}

.cell{
width:100px;
height:100px;
border:2px solid black;
border-radius:10px;
}

.active{
background:#2563eb;
}

</style>

</head>

<body>

<h1>N-Back Visual</h1>

<div id="grid">

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

</div>

<script>

const cells=document.querySelectorAll(".cell");

function mostrar(){

cells.forEach(c=>c.classList.remove("active"));

let pos=Math.floor(Math.random()*9);

cells[pos].classList.add("active");

}

setInterval(mostrar,1500);

</script>

</body>

</html>
