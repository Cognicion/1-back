<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuevo paciente</title>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    background:
        radial-gradient(circle at top left,#1f2937,transparent 35%),
        linear-gradient(135deg,#030303,#101010);
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
}

.contenedor{
    max-width:1100px;
    margin:auto;
    padding:60px 40px;
}

h1{
    font-size:48px;
    font-weight:300;
}

.tarjeta{
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:28px;
    padding:34px;
    margin-bottom:24px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:22px;
}

label{
    color:#aaa;
    display:block;
    margin-bottom:8px;
}

input, select, textarea{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:1px solid #333;
    background:#0d0d0d;
    color:white;
    font-size:16px;
}

textarea{
    min-height:120px;
    resize:vertical;
}

button{
    margin-top:20px;
    padding:14px 26px;
    border:none;
    border-radius:999px;
    background:white;
    color:black;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="contenedor">

<h1>Nuevo paciente</h1>

<div class="tarjeta">
<h2>Datos de identificación</h2>

<div class="grid">
    <div>
        <label>Nombre completo</label>
        <input id="nombre">
    </div>

    <div>
        <label>Fecha de nacimiento</label>
        <input id="fechaNacimiento" type="date">
    </div>

    <div>
        <label>Sexo</label>
        <select id="sexo">
            <option value="">Seleccionar</option>
            <option value="Hombre">Hombre</option>
            <option value="Mujer">Mujer</option>
            <option value="Prefiero no decirlo">Prefiero no decirlo</option>
</select>
        </select>
    </div>

    <div>
        <label>CURP</label>
        <input id="curp">
    </div>

    <div>
        <label>Teléfono</label>
        <input id="telefono">
    </div>

    <div>
        <label>Correo electrónico</label>
        <input id="email" type="email">
    </div>

    <div>
        <label>Estado civil</label>
        <input id="estadoCivil">
    </div>

    <div>
        <label>Escolaridad</label>
        <input id="escolaridad">
    </div>

    <div>
        <label>Ocupación</label>
        <input id="ocupacion">
    </div>
</div>
</div>

<div class="tarjeta">
<h2>Información clínica inicial</h2>

<div class="grid">
    <div>
        <label>Médico tratante</label>
        <input id="medicoTratante" value="Dr. Aldo Sandokan Aguilar Valenzuela">
    </div>

    <div>
        <label>Diagnóstico principal</label>
        <input id="diagnostico">
    </div>

    <div>
        <label>Última consulta</label>
        <input id="ultimaConsulta" type="date">
    </div>
</div>

<br>

<label>Tratamiento actual</label>
<textarea id="tratamiento"></textarea>

<br><br>

<label>Observaciones</label>
<textarea id="observaciones"></textarea>

<button onclick="guardarPacienteNuevo()">
Guardar paciente
</button>

</div>

</div>

<script type="module" src="js/nuevoPaciente.js"></script>

</body>
</html>
