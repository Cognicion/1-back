<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="assets/favicon-cognicion.png">

<title>Nuevo paciente</title>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    background:
        radial-gradient(circle at top, rgba(78,163,255,0.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(0,212,255,0.13), transparent 28%),
        linear-gradient(135deg, #050608, #080b10 50%, #0e1520);
    color:#f8fafc;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
}

.contenedor{
    max-width:1100px;
    margin:auto;
    padding:60px 40px;
}

h1{
    font-size:30px;
    font-weight:800;
}

.tarjeta{
    background:rgba(15, 18, 25, 0.88);
    border:1px solid rgba(255,255,255,0.10);
    border-radius:24px;
    padding:32px;
    margin-bottom:24px;
    box-shadow:0 0 35px rgba(78,163,255,0.10), 0 18px 50px rgba(0,0,0,0.38);
    backdrop-filter:blur(18px);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:22px;
}

label{
    color:#94a3b8;
    display:block;
    margin-bottom:8px;
    font-size:13px;
    font-weight:700;
}

input, select, textarea{
    width:100%;
    padding:11px 12px;
    border-radius:14px;
    border:1px solid rgba(148,163,184,0.25);
    background:rgba(15,23,42,0.95);
    color:white;
    font-size:14px;
}

input[type="date"]::-webkit-calendar-picker-indicator,
input[type="time"]::-webkit-calendar-picker-indicator{
    cursor:pointer;
    filter:invert(1) brightness(2.4);
    opacity:.95;
}

input[type="date"]::-webkit-calendar-picker-indicator:hover,
input[type="time"]::-webkit-calendar-picker-indicator:hover{
    opacity:1;
    filter:invert(1) brightness(3);
}

.ayuda-campo{
    display:block;
    margin-top:7px;
    color:#7c8da6;
    font-size:12px;
    line-height:1.35;
}

textarea{
    min-height:120px;
    resize:vertical;
}

button{
    margin-top:20px;
    padding:10px 14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg, #2563eb, #00d4ff);
    color:white;
    cursor:pointer;
    font-weight:700;
}

button:hover{
    box-shadow:0 0 28px rgba(0,212,255,0.28);
}

.input-accion{
    display:flex;
    gap:8px;
}

.input-accion input{
    flex:1;
}

.input-accion button{
    margin-top:0;
    white-space:nowrap;
}

.campo-condicional-oculto{
    display:none !important;
}

.campo-tipo-manual{
    margin-top:10px;
}

.modal-ingreso{
    position:fixed;
    inset:0;
    z-index:80;
    display:grid;
    place-items:center;
    padding:18px;
    background:rgba(2,6,23,0.64);
    backdrop-filter:blur(8px);
    opacity:0;
    pointer-events:none;
    transition:opacity .18s ease;
}

.modal-ingreso.abierto{
    opacity:1;
    pointer-events:auto;
}

.panel-ingreso{
    width:min(330px,100%);
    padding:18px;
    border:1px solid rgba(56,189,248,.28);
    border-radius:18px;
    background:rgba(8,12,20,.98);
    box-shadow:0 22px 70px rgba(0,0,0,.44), 0 0 26px rgba(56,189,248,.12);
}

.panel-ingreso-header{
    display:flex;
    justify-content:space-between;
    gap:12px;
    margin-bottom:14px;
}

.panel-ingreso-header p{
    margin:0 0 4px;
    color:#38bdf8;
    font-size:10px;
    font-weight:900;
    letter-spacing:.16em;
    text-transform:uppercase;
}

.panel-ingreso-header h3{
    margin:0;
}

.panel-ingreso-header button{
    width:32px;
    height:32px;
    padding:0;
    margin-top:0;
    border-radius:999px;
    background:rgba(15,23,42,.92);
}

.panel-ingreso label{
    margin-top:12px;
}

.panel-ingreso small{
    display:block;
    margin-top:10px;
    color:#7c8da6;
    font-size:12px;
}

.acciones-ingreso{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:16px;
}

.acciones-ingreso button{
    margin-top:0;
}
</style>
  <link rel="stylesheet" href="css/reportes.css">
</head>

<body>

<div class="contenedor">

<h1>Nuevo paciente</h1>

<div class="tarjeta">
<h2>Datos de identificación</h2>

<div class="grid">
    <div>
        <label>Nombre completo</label>
        <input id="nombre">
    </div>

    <div>
        <label>Fecha de nacimiento</label>
        <input id="fechaNacimiento" type="date">
    </div>

    <div>
        <label>Edad</label>
        <input id="edadManual" type="number" min="0" max="130" placeholder="Se calcula automaticamente">
        <small id="ayudaEdad" class="ayuda-campo">Si no hay fecha de nacimiento, puedes escribirla manualmente.</small>
    </div>

    <div>
        <label>Sexo</label>
        <select id="sexo">
            <option value="">Seleccionar</option>
            <option value="Hombre">Hombre</option>
            <option value="Mujer">Mujer</option>
            <option value="Prefiero no decirlo">Prefiero no decirlo</option>
        </select>
    </div>

    <div>
        <label>Genero</label>
        <input id="genero" placeholder="Ej. Femenino-CIS">
    </div>

    <div>
        <label>CURP</label>
        <input id="curp">
    </div>

    <div>
        <label>Teléfono</label>
        <input id="telefono">
    </div>

    <div>
        <label>Correo electrónico</label>
        <input id="email" type="email">
    </div>

    <div>
        <label>Estado civil</label>
        <input id="estadoCivil">
    </div>

    <div>
        <label>Escolaridad</label>
        <input id="escolaridad">
    </div>

    <div>
        <label>Ocupación</label>
        <input id="ocupacion">
    </div>

    <div>
        <label>Tipo de paciente</label>
        <select id="tipoPaciente">
            <option value="privada">Privado</option>
            <option value="institucion">Institucional</option>
            <option value="clinica">Clinica</option>
            <option value="otro">Otro...</option>
        </select>
        <input id="tipoPacienteManual" class="campo-tipo-manual campo-condicional-oculto" placeholder="Especificar tipo de paciente">
    </div>

    <div class="campo-institucional-nuevo">
        <label>Institucion</label>
        <input id="institucionPaciente" placeholder="Ej. Hospital Psiquiatrico Fray Bernardino Alvarez">
    </div>

    <div class="campo-institucional-nuevo">
        <label>Servicio institucional</label>
        <input id="servicioInstitucional" placeholder="Ej. Observacion">
    </div>

    <div class="campo-institucional-nuevo">
        <label>Expediente institucional</label>
        <input id="expediente">
    </div>

    <div class="campo-institucional-nuevo">
        <label>Cama</label>
        <input id="cama">
    </div>

    <div class="campo-institucional-nuevo">
        <label>Fecha y hora de ingreso</label>
        <div class="input-accion">
            <input id="fechaIngreso" placeholder="DD/MM/AAAA HH:mm" readonly>
            <button type="button" id="abrirIngresoNuevo">Elegir</button>
        </div>
    </div>

    <div>
        <label>Alergias</label>
        <input id="alergias" placeholder="Negadas, no conocidas o especificar">
    </div>

    <div>
        <label>Tipo de sangre</label>
        <input id="tipoSangre" placeholder="Ej. O+, A-, AB+">
    </div>

    <div>
        <label>Peso</label>
        <input id="peso" type="number" min="0" step="0.1" placeholder="kg">
    </div>

    <div>
        <label>Talla</label>
        <input id="talla" type="number" min="0" step="0.01" placeholder="m">
    </div>

    <div>
        <label>IMC</label>
        <input id="imc" placeholder="Se calcula automaticamente" readonly>
    </div>

    <div>
        <label>Perimetro abdominal</label>
        <input id="perimetroAbdominal" type="number" min="0" step="0.1" placeholder="cm">
    </div>

    <div>
        <label>Estancia manual / observacion</label>
        <input id="diasEstancia" placeholder="Opcional, el conteo se calcula desde ingreso">
    </div>
</div>
</div>

<div class="tarjeta">
<h2>Información clínica inicial</h2>

<div class="grid">
    <div>
        <label>Médico tratante</label>
        <input id="medicoTratante" placeholder="Se tomará de tu perfil profesional">
    </div>

    <div>
        <label>Diagnóstico principal</label>
        <input id="diagnostico">
    </div>

    <div>
        <label>Última consulta</label>
        <input id="ultimaConsulta" type="date">
    </div>
</div>

<br>

<label>Tratamiento actual</label>
<textarea id="tratamiento"></textarea>

<br><br>

<label>Observaciones</label>
<textarea id="observaciones"></textarea>

<button onclick="guardarPacienteNuevo()">
Guardar paciente
</button>

</div>

</div>

<div id="modalIngresoNuevo" class="modal-ingreso" aria-hidden="true">
    <div class="panel-ingreso" role="dialog" aria-modal="true" aria-labelledby="tituloIngresoNuevo">
        <div class="panel-ingreso-header">
            <div>
                <p>Fecha de ingreso</p>
                <h3 id="tituloIngresoNuevo">Seleccionar ingreso</h3>
            </div>
            <button type="button" id="cerrarIngresoNuevo" aria-label="Cerrar selector">×</button>
        </div>

        <label>Dia
            <input id="ingresoNuevoFecha" type="date">
        </label>

        <label>Hora
            <input id="ingresoNuevoHora" type="time" lang="en-GB" step="60">
        </label>

        <small>Si no seleccionas hora, se tomara el inicio del dia.</small>

        <div class="acciones-ingreso">
            <button type="button" id="limpiarIngresoNuevo">Limpiar</button>
            <button type="button" id="guardarIngresoNuevo">Aplicar</button>
        </div>
    </div>
</div>

<script type="module" src="js/nuevoPaciente.js"></script>

  <script type="module" src="js/reportes.js"></script>
</body>
</html>
